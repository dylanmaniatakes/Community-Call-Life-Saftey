<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroScout Raw Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #94a3b8;
      text-transform: uppercase;
    }

    #status-badge {
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: #334155;
      color: #94a3b8;
      transition: background 0.3s, color 0.3s;
    }
    #status-badge.connected    { background: #14532d; color: #4ade80; }
    #status-badge.connecting   { background: #422006; color: #fb923c; }
    #status-badge.disconnected { background: #334155; color: #94a3b8; }
    #status-badge.error        { background: #450a0a; color: #f87171; }
    #status-badge.disabled     { background: #1e1e2e; color: #6b7280; }

    .spacer { flex: 1; }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    label { color: #64748b; font-size: 11px; }

    select, button {
      background: #0f172a;
      border: 1px solid #334155;
      color: #cbd5e1;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    select:focus, button:focus { outline: 1px solid #3b82f6; }
    button:hover { background: #1e293b; }

    button.danger { border-color: #7f1d1d; color: #f87171; }
    button.danger:hover { background: #450a0a; }

    #btn-reload { border-color: #1e40af; color: #60a5fa; }
    #btn-reload:hover { background: #1e3a5f; }

    /* ── Stats bar ── */
    #stats {
      display: flex;
      gap: 20px;
      padding: 6px 16px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      font-size: 11px;
      color: #475569;
      flex-shrink: 0;
    }
    #stats span b { color: #94a3b8; }

    /* ── Log area ── */
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .row {
      display: grid;
      grid-template-columns: 80px 110px 1fr;
      gap: 0;
      padding: 3px 12px;
      border-bottom: 1px solid transparent;
      line-height: 1.5;
    }
    .row:hover { background: #1e293b44; }

    .row.banner         { border-left: 3px solid #a78bfa; }
    .row.login-response { border-left: 3px solid #34d399; }
    .row.data           { border-left: 3px solid #3b82f6; }
    .row.status         { border-left: 3px solid #94a3b8; font-style: italic; color: #64748b; }
    .row.error-row      { border-left: 3px solid #f87171; color: #fca5a5; }
    .row.ws             { border-left: 3px solid #fbbf24; color: #78716c; font-style: italic; }

    .col-ts    { color: #475569; white-space: nowrap; }
    .col-label { color: #64748b; }
    .col-label.lbl-banner         { color: #a78bfa; }
    .col-label.lbl-login-response { color: #34d399; }
    .col-label.lbl-data           { color: #60a5fa; }
    .col-label.lbl-status         { color: #94a3b8; }
    .col-label.lbl-error          { color: #f87171; }
    .col-label.lbl-ws             { color: #fbbf24; }

    .col-content { word-break: break-all; white-space: pre-wrap; }

    .hex-block {
      color: #475569;
      font-size: 11px;
      margin-top: 2px;
    }

    /* scrollbar */
    #log::-webkit-scrollbar { width: 6px; }
    #log::-webkit-scrollbar-track { background: #0f172a; }
    #log::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    #empty {
      text-align: center;
      color: #334155;
      margin-top: 60px;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<header>
  <h1>AeroScout Raw Monitor</h1>
  <span id="status-badge" class="disconnected">disconnected</span>
  <div class="spacer"></div>
  <div class="toolbar">
    <label>View:</label>
    <select id="sel-view">
      <option value="both">Text + Hex</option>
      <option value="text">Text only</option>
      <option value="hex">Hex only</option>
    </select>
    <button id="btn-reload">⟳ Reconnect</button>
    <button class="danger" id="btn-clear">Clear</button>
    <button id="btn-pause">Pause</button>
  </div>
</header>

<div id="stats">
  <span>Packets: <b id="cnt-packets">0</b></span>
  <span>Bytes: <b id="cnt-bytes">0</b></span>
  <span>WS: <b id="ws-state">—</b></span>
</div>

<div id="log">
  <div id="empty">Waiting for data…</div>
</div>

<script>
  const logEl     = document.getElementById('log');
  const emptyEl   = document.getElementById('empty');
  const badgeEl   = document.getElementById('status-badge');
  const cntPkt    = document.getElementById('cnt-packets');
  const cntBytes  = document.getElementById('cnt-bytes');
  const wsStateEl = document.getElementById('ws-state');
  const selView   = document.getElementById('sel-view');

  let paused      = false;
  let totalPkts   = 0;
  let totalBytes  = 0;
  let ws          = null;

  // ── WebSocket ──────────────────────────────────────────────────────────────

  function wsConnect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      wsStateEl.textContent = 'connected';
      appendRow('ws', 'ws', 'WebSocket connected');
    };

    ws.onclose = () => {
      wsStateEl.textContent = 'closed — retry in 5 s';
      appendRow('ws', 'ws', 'WebSocket closed — retrying…');
      setTimeout(wsConnect, 5000);
    };

    ws.onerror = () => {
      wsStateEl.textContent = 'error';
    };

    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }

      if (msg.event === 'aeroscout.status') {
        const s = msg.data.status || 'unknown';
        setBadge(s);
        appendRow('status', 'status', `Status → ${s}`);
      }

      if (msg.event === 'aeroscout.raw') {
        handleRaw(msg.data);
      }
    };

    // keepalive ping every 25 s
    setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping');
    }, 25000);
  }

  // ── Badge ──────────────────────────────────────────────────────────────────

  function setBadge(s) {
    badgeEl.textContent = s;
    badgeEl.className = '';
    badgeEl.classList.add(s.split(' ')[0]);   // use first word as CSS class
  }

  // ── Raw data handler ───────────────────────────────────────────────────────

  function handleRaw(data) {
    totalPkts++;
    totalBytes += (data.length || 0);
    cntPkt.textContent   = totalPkts;
    cntBytes.textContent = fmtBytes(totalBytes);

    // Determine label from text prefix injected by the module
    let label = 'data';
    let text  = data.text || '';

    if (text.startsWith('[banner]'))         { label = 'banner';         text = text.slice(9).trim(); }
    else if (text.startsWith('[login-response]')) { label = 'login-response'; text = text.slice(17).trim(); }

    const hex  = data.hex  || '';
    const ts   = data.ts   || '';
    const view = selView.value;

    let content = '';
    if (view === 'both' || view === 'text') content += text;
    if (view === 'both' && hex)             content += '\n';
    if (view === 'both' || view === 'hex')  content += `<span class="hex-block">${escHtml(hex)}</span>`;

    appendRow(label, label, content, ts, true);
  }

  // ── Row builder ────────────────────────────────────────────────────────────

  function appendRow(rowCls, labelCls, content, ts = '', rawHtml = false) {
    if (paused) return;

    emptyEl.style.display = 'none';

    const now = ts || new Date().toTimeString().slice(0, 8);

    const row = document.createElement('div');
    row.className = `row ${rowCls}`;

    const c = document.createElement('span');
    c.className = 'col-content';
    if (rawHtml) c.innerHTML = content;
    else         c.textContent = content;

    row.innerHTML = `<span class="col-ts">${escHtml(now)}</span>`
                  + `<span class="col-label lbl-${labelCls}">[${labelCls}]</span>`;
    row.appendChild(c);

    logEl.appendChild(row);

    // Auto-scroll
    if (logEl.scrollHeight - logEl.scrollTop < logEl.clientHeight + 60) {
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Cap at 2000 rows
    while (logEl.children.length > 2001) logEl.removeChild(logEl.children[1]);
  }

  // ── Helpers ────────────────────────────────────────────────────────────────

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fmtBytes(n) {
    if (n < 1024)       return `${n} B`;
    if (n < 1048576)    return `${(n/1024).toFixed(1)} KB`;
    return `${(n/1048576).toFixed(2)} MB`;
  }

  // ── Controls ───────────────────────────────────────────────────────────────

  document.getElementById('btn-clear').addEventListener('click', () => {
    while (logEl.children.length > 1) logEl.removeChild(logEl.lastChild);
    emptyEl.style.display = '';
    totalPkts = 0; totalBytes = 0;
    cntPkt.textContent = '0';
    cntBytes.textContent = '0';
  });

  document.getElementById('btn-pause').addEventListener('click', function () {
    paused = !paused;
    this.textContent = paused ? 'Resume' : 'Pause';
    this.style.borderColor = paused ? '#fbbf24' : '';
    this.style.color       = paused ? '#fbbf24' : '';
  });

  document.getElementById('btn-reload').addEventListener('click', async () => {
    appendRow('ws', 'ws', 'Sending reconnect request…');
    try {
      const r = await fetch('/api/aeroscout/reload', { method: 'POST' });
      const j = await r.json();
      appendRow('ws', 'ws', `Reconnect response: ${JSON.stringify(j)}`);
    } catch (e) {
      appendRow('error-row', 'error', `Reconnect failed: ${e}`);
    }
  });

  // Poll status on load to populate badge immediately
  fetch('/api/aeroscout/status')
    .then(r => r.json())
    .then(j => setBadge(j.status || 'unknown'))
    .catch(() => {});

  wsConnect();
</script>
</body>
</html>
