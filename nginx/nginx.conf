# ── Community Call — Nginx reverse proxy ─────────────────────────────────────
# Terminates TLS, proxies HTTP + WebSocket to the FastAPI app on port 8000.
# Self-signed cert is generated by entrypoint.sh on first boot.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # Gzip static assets
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml;

    # Hide nginx version in headers
    server_tokens off;

    # ── Upstream — FastAPI app ────────────────────────────────────────────────
    upstream app {
        server app:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let Docker health checks through on plain HTTP
        location /health {
            proxy_pass http://app;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Modern TLS only
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Basic security headers
        add_header X-Frame-Options        SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff   always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── WebSocket proxy (/ws) ─────────────────────────────────────────────
        # WebSocket connections need the Upgrade handshake and a long timeout
        # so the persistent connection survives idle periods.
        location /ws {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep the connection open; clients ping every 20 s
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # ── REST API / app ────────────────────────────────────────────────────
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";        # enable keepalive to upstream
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts generous enough for slow hardware (Raspberry Pi etc.)
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;

            # Buffer settings — keep small for real-time SSE-style responses
            proxy_buffering    off;
            proxy_buffer_size  4k;
        }

        # Cache static assets aggressively (they're versioned by the app)
        location /static/ {
            proxy_pass         http://app;
            proxy_set_header   Host $host;
            expires            7d;
            add_header         Cache-Control "public, immutable";
        }
    }
}
