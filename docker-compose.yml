# ── Community Call — Docker Compose ──────────────────────────────────────────
# Usage:
#   docker compose up -d
#
# For LAN phone access — set SERVER_IP so the cert covers your local IP:
#   echo "SERVER_IP=192.168.1.100" >> .env
#   docker compose up -d
#
# Everything is bind-mounted from this folder — fully portable.
# Copy the folder to any machine with Docker and `docker compose up -d`.
#
# Folder layout (created automatically on first run):
#   ./nurse_call.db — SQLite database (in the project root alongside the code)
#   ./certs/        — CA cert + server cert/key (generated by nginx on first boot)
#
# Certificate setup (one-time per device):
#   Visit https://<server-ip>/sslcert on each device and follow the instructions.
#   Install ca.crt — once trusted, all future cert renewals are automatic.

services:

  # ── FastAPI application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
    volumes:
      # Source code + database — everything in the project folder
      - .:/app
      # Read-only access to the CA cert so /sslcert can serve it for download
      - ./certs:/etc/nginx/ssl:ro
    environment:
      DB_PATH: /app/nurse_call.db
      PYTHONUNBUFFERED: "1"
    command:
      - uvicorn
      - main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "1"
      - --reload
      - --log-level
      - info
    # Port 8000 is intentionally NOT exposed — nginx is the only entry point.
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Nginx reverse proxy (TLS termination) ────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # TLS certs — CA cert + server cert/key live in ./certs/ on the host
      - ./certs:/etc/nginx/ssl
    environment:
      SERVER_NAME: "${SERVER_NAME:-community-call}"
      # Set to your LAN IP so the server cert covers the IP address.
      # Devices can then access the system by IP without hostname resolution.
      # e.g.  SERVER_IP=192.168.1.100
      SERVER_IP: "${SERVER_IP:-}"
      CERT_DAYS: "${CERT_DAYS:-3650}"

networks:
  internal:
    driver: bridge
